name: firecrawl

x-common-service: &common-service
  image: ghcr.io/firecrawl/firecrawl:latest
  networks:
    - backend
  environment:
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - REDIS_RATE_LIMIT_URL=${REDIS_URL:-redis://redis:6379}
    - PLAYWRIGHT_MICROSERVICE_URL=${PLAYWRIGHT_MICROSERVICE_URL:-http://playwright-service:3000}
    - PORT=${PORT:-3002}
    - NUM_WORKERS_PER_QUEUE=${NUM_WORKERS_PER_QUEUE:-2}
    - BULL_AUTH_KEY=${BULL_AUTH_KEY:-CHANGEME}
    - HOST=${HOST:-0.0.0.0}
    - SELF_HOSTED=true
    - USE_DB_AUTHENTICATION=false
    - NUQ_DATABASE_URL=postgres://postgres:password@postgres:5432/postgres
    - NUQ_RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    environment:
      - PORT=3000
    networks:
      - backend

  api:
    <<: *common-service
    depends_on:
      - redis
      - playwright-service
      - postgres
      - rabbitmq
    ports:
      - "3002:3002"
    command: ["node", "dist/src/harness.js", "--start-docker"]
    restart: always

  worker:
    <<: *common-service
    depends_on:
      - redis
      - playwright-service
      - api
      - postgres
      - rabbitmq
    command: ["node", "dist/src/harness.js", "--start-docker"]
    restart: always

  postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - backend
    command: redis-server --bind 0.0.0.0

networks:
  backend:
    driver: bridge
